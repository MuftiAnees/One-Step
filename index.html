<!doctype html>
<html lang="en">
  <head>
    <title>One Step</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="launch-screen">
      <div class="left">
        <h1 class="app-name">One Step</h1>
        <p class="headline">Start Small. Keep Going.</p>
        <p class="description">
          A task tracker built for people who struggle to begin. No pressure, no
          streaks to break. Just one step at a time.
        </p>
        <button class="btn-primary">I'm ready to begin</button>
      </div>

      <div class="right">
        <p class="quote-label">Today's thought</p>
        <div class="quote-card">
          <p class="quote-text">
            "You don't have to see the whole staircase. Just take the first
            step."
          </p>
          <p class="quote-attr">— Martin Luther King Jr.</p>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
